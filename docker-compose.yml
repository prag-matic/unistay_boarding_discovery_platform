services:
  traefik:
    image: traefik:v3.6
    container_name: unistay_traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/etc/traefik/traefik-dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik-dynamic.yml:/etc/traefik/traefik-dynamic.yml:ro
      - ./certs:/etc/traefik/certs:ro
    networks:
      - unistay-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unistay_backend
    environment:
      - PORT=4001
      - OPENINARY_PUBLIC_URL=https://unistay.mrbhanuka.dev/openinary
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      openinary:
        condition: service_started
    networks:
      - unistay-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`unistay.mrbhanuka.dev`) && PathPrefix(`/backend`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.middlewares=backend-strip"
      - "traefik.http.middlewares.backend-strip.stripprefix.prefixes=/backend"
      - "traefik.http.services.backend.loadbalancer.server.port=${PORT}"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: unistay_admin
    environment:
      - PORT=4002
    networks:
      - unistay-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`unistay.mrbhanuka.dev`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls=true"
      - "traefik.http.services.admin.loadbalancer.server.port=${PORT}"

  mongodb:
    image: mongo:7
    container_name: unistay_mongodb
    env_file:
      - .env
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - unistay-net

  minio:
    image: minio/minio:latest
    container_name: unistay_minio
    env_file:
      - .env
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - unistay-net

  create-bucket:
    image: minio/mc:latest
    container_name: unistay_create_bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} || exit 1;
      mc mb -p myminio/${MINIO_BUCKET} || exit 0;
      mc anonymous set download myminio/${MINIO_BUCKET} || exit 0;
      exit 0;
      "
    networks:
      - unistay-net

  openinary:
    image: openinary/openinary:latest
    container_name: unistay_openinary
    environment:
      - STORAGE_REGION=${MINIO_REGION}
      - STORAGE_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - STORAGE_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - STORAGE_BUCKET_NAME=${MINIO_BUCKET}
      - STORAGE_ENDPOINT=http://minio:9000
      - BETTER_AUTH_URL=http://localhost:3001
    depends_on:
      minio:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    volumes:
      - openinary_db:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - unistay-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openinary.rule=Host(`unistay.mrbhanuka.dev`) && PathPrefix(`/openinary`)"
      - "traefik.http.routers.openinary.entrypoints=websecure"
      - "traefik.http.routers.openinary.tls=true"
      - "traefik.http.routers.openinary.middlewares=openinary-strip"
      - "traefik.http.middlewares.openinary-strip.stripprefix.prefixes=/openinary"
      - "traefik.http.services.openinary.loadbalancer.server.port=3001"

networks:
  unistay-net:
    name: unistay-net

volumes:
  mongodb_data:
  minio_data:
  openinary_db:
