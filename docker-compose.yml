services:
  traefik:
    image: traefik:v3.6
    container_name: unistay_traefik
    command:
      - "--log.level=DEBUG"
      - "--accesslog=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Global HTTP to HTTPS redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Let's Encrypt TLS Challenge configuration
      - "--certificatesresolvers.unistay-resolver.acme.tlschallenge=true"
      - "--certificatesresolvers.unistay-resolver.acme.email=unistay@mrbhanuka.dev"
      - "--certificatesresolvers.unistay-resolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - unistay-backend
      - unistay-admin

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unistay_backend
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      db-seed:
        condition: service_completed_successfully
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - unistay-backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`backend.unistay.mrbhanuka.dev`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=unistay-resolver"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"
      - "traefik.docker.network=unistay-backend"
      - "traefik.http.middlewares.backend-rl.ratelimit.average=10"
      - "traefik.http.middlewares.backend-rl.ratelimit.burst=50"
      - "traefik.http.routers.backend.middlewares=backend-rl"
  db-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unistay_db_seed
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    command: ["pnpm", "seed"]
    networks:
      - unistay-backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=https://backend.unistay.mrbhanuka.dev/api
    container_name: unistay_admin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - unistay-admin
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.unistay.mrbhanuka.dev`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls=true"
      - "traefik.http.routers.admin.tls.certresolver=unistay-resolver"
      - "traefik.http.services.admin.loadbalancer.server.port=3000"
      - "traefik.docker.network=unistay-admin"

  mongodb:
    image: mongo:7
    container_name: unistay_mongodb
    env_file:
      - .env
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - unistay-backend

networks:
  unistay-backend:
    name: unistay-backend
  unistay-admin:
    name: unistay-admin

volumes:
  mongodb_data:
