services:
  prisma-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
    container_name: unistay_prisma_migrate
    environment:
      - DATABASE_URL=${DATABASE_URL}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run prisma:generate && npm run prisma:migrate:deploy"
    profiles:
      - prod
      - dev

  prisma-seed:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
    container_name: unistay_prisma_seed
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=development
    env_file:
      - .env
    volumes:
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      prisma-migrate:
        condition: service_completed_successfully
    command: sh -c "sleep 3 && npm run prisma:seed || npm run prisma:seed"
    profiles:
      - prod
      - dev

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
    container_name: unistay_backend
    ports:
      - "${PORT}:${PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      openinary:
        condition: service_healthy
      prisma-migrate:
        condition: service_completed_successfully
      prisma-seed:
        condition: service_completed_successfully
    command: npm start
    profiles:
      - prod

  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unistay_backend_dev
    ports:
      - "${PORT}:${PORT}"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      openinary:
        condition: service_started
      prisma-migrate:
        condition: service_completed_successfully
      prisma-seed:
        condition: service_completed_successfully
    command: sh -c "npm run prisma:generate && npm run dev"
    profiles:
      - dev

  postgres:
    image: postgres:18-alpine
    container_name: unistay_postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: unistay_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  create-bucket:
    image: minio/mc:latest
    container_name: unistay_create_bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} || exit 1;
      mc mb -p myminio/${MINIO_BUCKET} || exit 0;
      mc anonymous set download myminio/${MINIO_BUCKET} || exit 0;
      exit 0;
      "

  openinary:
    image: openinary/openinary:latest
    container_name: unistay_openinary
    ports:
      - "3001:3000"
    environment:
      - STORAGE_REGION=${MINIO_REGION}
      - STORAGE_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - STORAGE_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - STORAGE_BUCKET_NAME=${MINIO_BUCKET}
      - STORAGE_ENDPOINT=http://minio:9000
      - BETTER_AUTH_URL=http://localhost:3001
    depends_on:
      minio:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    volumes:
      - openinary_db:/app/data

volumes:
  postgres_data:
  minio_data:
  openinary_db:
