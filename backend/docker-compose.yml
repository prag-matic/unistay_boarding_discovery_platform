services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unistay_backend
    ports:
      - "${PORT}:${PORT}"
    environment:
      - NODE_ENV=development
      - PORT=${PORT}
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      openinary:
        condition: service_started
    command: pnpm run dev
    volumes:
      - .:/app
      - /app/node_modules

  mongodb:
    image: mongo:7
    container_name: unistay_mongodb
    ports:
      - "27017:27017"
    env_file:
      - .env
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: unistay_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  create-bucket:
    image: minio/mc:latest
    container_name: unistay_create_bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} || exit 1;
      mc mb -p myminio/${MINIO_BUCKET} || exit 0;
      mc anonymous set download myminio/${MINIO_BUCKET} || exit 0;
      exit 0;
      "

  openinary:
    image: openinary/openinary:latest
    container_name: unistay_openinary
    ports:
      - "3001:3001"
    environment:
      - STORAGE_REGION=${MINIO_REGION}
      - STORAGE_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - STORAGE_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - STORAGE_BUCKET_NAME=${MINIO_BUCKET}
      - STORAGE_ENDPOINT=http://minio:9000
      - BETTER_AUTH_URL=http://localhost:3001
    depends_on:
      minio:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    volumes:
      - openinary_db:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongodb_data:
  minio_data:
  openinary_db:
